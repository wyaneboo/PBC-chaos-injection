# PBC Chaos Simulator Phase 7 config.
#
# severity:
#   Integer from 0 to 5 controlling the default messiness profile.
#   0 = clean export
#   1 = minor formatting mess
#   2 = common finance team mess
#   3 = messy audit season file
#   4 = highly chaotic client submission
#   5 = nightmare PBC file
#
# probabilities:
#   Each value must be between 0 and 1. Missing values inherit from the selected
#   severity profile. Each probability is evaluated independently per worksheet.
#
# merged_cells:
#   Adds merged title/footer cells around the main table.
# hidden_rows:
#   Hides non-header data rows.
# hidden_columns:
#   Hides non-key table columns.
# duplicated_headers:
#   Inserts repeated header rows inside long schedules.
# inserted_notes:
#   Adds title blocks, client notes, footer notes, blank separators, and comments.
# subtotal_rows:
#   Inserts manual subtotal rows with formulas.
# wrong_period_rows:
#   Copies selected rows and shifts date/year fields outside the reporting period.
# renamed_columns:
#   Replaces canonical headers with finance-team shorthand.
# stringified_numbers:
#   Converts selected numeric cells to text values such as "12,345.67".
# formula_errors:
#   Injects broken formulas such as #REF! or divide-by-zero formulas.
# multiple_tables_in_one_sheet:
#   Adds small side tables below the main support schedule.
# old_version_tabs:
#   Adds visible old-version copies of selected sheets.
# hidden_reconciliation_tabs:
#   Adds hidden client working/reconciliation tabs.
# pbc_request_list:
#   Applies a dedicated PBC request-list tracker layout.
# tracker_status_noise:
#   Adds inconsistent client submission and review status wording.
# tracker_deadline_noise:
#   Adds mixed due-date, received-date, and follow-up values.
# tracker_visible_comments:
#   Adds dense visible auditor/client comments in tracker rows.
# tracker_update_highlights:
#   Highlights new or updated tracker rows.
# tracker_instruction_blocks:
#   Adds prominent client instruction, PIC, template, and timeline warning blocks.

severity: 3

# Optional non-deterministic post-pass. Leave disabled for reproducible outputs.
# unreproducible_nightmare_mode:
#   enabled: false
#   use_llm_planner: true
#   llm_model: gemma-4-31b-it
#   gemini_api_key_env: GEMINI_API_KEY
#   llm_timeout_seconds: 180
#   notation_count: 24
#   extra_tool_count: 4
#   max_notation_length: 96

probabilities:
  merged_cells: 0.45
  hidden_rows: 0.18
  hidden_columns: 0.12
  duplicated_headers: 0.20
  inserted_notes: 0.55
  subtotal_rows: 0.35
  wrong_period_rows: 0.10
  renamed_columns: 0.22
  stringified_numbers: 0.25
  formula_errors: 0.08
  multiple_tables_in_one_sheet: 0.15
  old_version_tabs: 0.35
  hidden_reconciliation_tabs: 0.25
  pbc_request_list: 0.85
  tracker_status_noise: 0.62
  tracker_deadline_noise: 0.55
  tracker_visible_comments: 0.62
  tracker_update_highlights: 0.55
  tracker_instruction_blocks: 0.80
